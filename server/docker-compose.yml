services:
  lan-control-plane-server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: lan-control-plane-server
    restart: unless-stopped
    env_file:
      - ./.env
    working_dir: /app
    volumes:
      - ./data:/app/data
    ports:
      - "8765:8000"
    networks:
      - private-net

  migrate:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: lan-control-plane-migrate
    env_file:
      - ./.env
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
    command: >
      alembic upgrade head
    networks:
      - private-net
    profiles:
      - tools

  create-admin:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: lan-control-plane-create-admin
    env_file:
      - ./.env
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    command: >
      python /app/scripts/create_admin.py
    networks:
      - private-net
    profiles:
      - tools

  makemigrations:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: lan-control-plane-makemigrations
    env_file:
      - ./.env
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./server/src:/app/server/src
      - ./shared/src:/app/shared/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
    command: >
      alembic revision --autogenerate -m "update schema"
    networks:
      - private-net
    profiles:
      - tools

networks:
  private-net:
    external: true
