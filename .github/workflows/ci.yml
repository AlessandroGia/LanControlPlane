name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  quality-and-tests:
    name: Quality and tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - shared
          - server
          - agent

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest -q

  alembic:
    name: Alembic migration check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Prepare server env file
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=sqlite:///./data/lan_control_plane.db
          SESSION_COOKIE_NAME=lcp_session
          SESSION_TTL_HOURS=12
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          AGENT_SHARED_SECRET=ci-agent-secret
          EOF

      - name: Prepare local sqlite path
        run: mkdir -p data

      - name: Run Alembic upgrade
        run: uv run alembic -c alembic.ini upgrade head

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f server/Dockerfile -t lan-control-plane-server .

      - name: Build agent image
        run: docker build -f agent/Dockerfile -t lan-control-plane-agent .

      - name: Build web image
        run: docker build -f web/Dockerfile -t lan-control-plane-web .
